name: LLVM core libs
on:
  workflow_dispatch:
  push:
    branches:
      - llvm-core-package
    paths:
      - ".github/workflows/llvm-core-libs.yml"
      - "cmake/llvm-core-libs.cmake"
jobs:
  build:
    name: LLVM core libs ${{matrix.version}} [x86_64-windows-mt]
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        version: [ 20.1.8, 22.1.4 ]

        include:
          - version: 20.1.8
            ref: llvmorg-20.1.8
          - version: 22.1.4
            ref: llvmorg-22.1.4

    steps:
      - name: Clone project
        uses: actions/checkout@v6
        with:
          path: llvm-prebuilt

      - name: Configure Windows runner
        run: choco install --no-progress ninja 7zip

      - name: Clone LLVM ${{matrix.version}}
        uses: actions/checkout@v6
        with:
          repository: llvm/llvm-project
          ref: ${{matrix.ref}}
          path: llvm-project

      - name: Enable Windows host environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure LLVM host tools
        shell: pwsh
        run: |
          cmake -G Ninja -S llvm-project\llvm -B llvm-host `
            -DLLVM_TARGETS_TO_BUILD=X86 `
            -DLLVM_ENABLE_PROJECTS="" `
            -DLLVM_ENABLE_RUNTIMES="" `
            -DLLVM_ENABLE_LIBXML2=OFF `
            -DLLVM_ENABLE_ZLIB=OFF `
            -DLLVM_ENABLE_ZSTD=OFF `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DCMAKE_BUILD_TYPE=Release -Wno-dev

      - name: Build LLVM host tools
        shell: pwsh
        run: |
          cmake --build llvm-host --target llvm-tblgen llvm-config
          $HostBinPath = Join-Path $Env:GITHUB_WORKSPACE "llvm-host\bin"
          echo "LLVM_NATIVE_TOOL_DIR=$HostBinPath" >> $Env:GITHUB_ENV
          echo "LLVM_TABLEGEN=$HostBinPath/llvm-tblgen.exe" >> $Env:GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$HostBinPath/llvm-config.exe" >> $Env:GITHUB_ENV
          echo "LLVM_VERSION=${{matrix.version}}" >> $Env:GITHUB_ENV

      - name: Enable Windows target environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure LLVM core libs
        shell: pwsh
        run: |
          $CMakeToolchainFile = "$Env:GITHUB_WORKSPACE\llvm-prebuilt\cmake\x86_64-windows.cmake"
          $CMakeInitialCache = "$Env:GITHUB_WORKSPACE\llvm-prebuilt\cmake\llvm-core-libs.cmake"

          cmake -G Ninja -S llvm-project\llvm -B llvm-build `
            -DCMAKE_INSTALL_PREFIX=llvm-install `
            -DCMAKE_TOOLCHAIN_FILE="$CMakeToolchainFile" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DLLVM_BUILD_LLVM_DYLIB=OFF `
            -DLLVM_BUILD_LLVM_C_DYLIB=OFF `
            -DLLVM_LINK_LLVM_DYLIB=OFF `
            -DLLVM_ENABLE_LIBXML2=OFF `
            -DLLVM_ENABLE_ZLIB=OFF `
            -DLLVM_ENABLE_ZSTD=OFF `
            -C $CMakeInitialCache -Wno-dev

      - name: Install LLVM core libs
        run: cmake --build llvm-build --target install-distribution

      - name: Stage LLVM core libs
        shell: pwsh
        run: |
          $PackageName = "llvm-core-libs-${{matrix.version}}-x86_64-windows-mt"
          $PackageRoot = Join-Path $PWD $PackageName
          $PackageBinDir = Join-Path $PackageRoot "bin"
          $PackageIncludeDir = Join-Path $PackageRoot "include"
          $PackageLibDir = Join-Path $PackageRoot "lib"

          New-Item -ItemType Directory -Path $PackageBinDir, $PackageIncludeDir, $PackageLibDir -Force | Out-Null

          Copy-Item -Path llvm-install\bin\llvm-config.exe -Destination $PackageBinDir -Force
          Copy-Item -Path llvm-install\include\llvm-c -Destination $PackageIncludeDir -Recurse -Force
          Copy-Item -Path llvm-install\include\llvm -Destination $PackageIncludeDir -Recurse -Force

          $CMakeConfigDir = "llvm-install\lib\cmake\llvm"
          if (Test-Path $CMakeConfigDir) {
            $PackageCMakeDir = Join-Path $PackageLibDir "cmake"
            New-Item -ItemType Directory -Path $PackageCMakeDir -Force | Out-Null
            Copy-Item -Path $CMakeConfigDir -Destination $PackageCMakeDir -Recurse -Force
          }

          $RequiredLibs = @(
            "LLVMBitReader.lib",
            "LLVMCore.lib",
            "LLVMRemarks.lib",
            "LLVMBitstreamReader.lib",
            "LLVMBinaryFormat.lib",
            "LLVMTargetParser.lib",
            "LLVMSupport.lib",
            "LLVMDemangle.lib"
          )

          foreach ($RequiredLib in $RequiredLibs) {
            Copy-Item -Path (Join-Path "llvm-install\lib" $RequiredLib) -Destination $PackageLibDir -Force
          }

          @(
            "LLVM_VERSION=${{matrix.version}}"
            "LLVM_REF=${{matrix.ref}}"
            "TARGET=x86_64-windows"
            "MSVC_RUNTIME=MultiThreaded"
          ) | Set-Content -Path (Join-Path $PackageRoot "VERSION.txt") -Encoding ASCII

      - name: Validate LLVM core libs
        shell: pwsh
        run: |
          function Convert-ToLibName {
            param([string] $Token)

            $Value = $Token.Trim().Trim('"')
            if ([string]::IsNullOrWhiteSpace($Value)) {
              return $null
            }

            if ($Value.StartsWith("-l")) {
              return "$($Value.Substring(2)).lib"
            }

            if ($Value.EndsWith(".lib", [System.StringComparison]::OrdinalIgnoreCase)) {
              return [System.IO.Path]::GetFileName($Value)
            }

            return $Value
          }

          function Compare-LibSet {
            param(
              [string[]] $Expected,
              [string[]] $Actual,
              [string] $Label
            )

            $ExpectedSorted = @($Expected | Sort-Object -Unique)
            $ActualSorted = @($Actual | Sort-Object -Unique)
            $Diff = @(Compare-Object -ReferenceObject $ExpectedSorted -DifferenceObject $ActualSorted)
            if ($Diff.Count -ne 0) {
              throw "$Label mismatch. Expected: $($ExpectedSorted -join ' '); Actual: $($ActualSorted -join ' ')"
            }
          }

          $PackageName = "llvm-core-libs-${{matrix.version}}-x86_64-windows-mt"
          $PackageRoot = Join-Path $PWD $PackageName
          $LlvmConfig = Join-Path $PackageRoot "bin\llvm-config.exe"
          $PackageLibDir = Join-Path $PackageRoot "lib"

          $Version = (& $LlvmConfig --version).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "llvm-config --version failed"
          }

          $ReportedLibDir = (& $LlvmConfig --libdir).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "llvm-config --libdir failed"
          }

          $ExpectedLibDirPath = (Resolve-Path $PackageLibDir).Path.TrimEnd('\')
          $ReportedLibDirPath = (Resolve-Path $ReportedLibDir).Path.TrimEnd('\')
          if ($ExpectedLibDirPath -ne $ReportedLibDirPath) {
            throw "llvm-config --libdir reported '$ReportedLibDirPath', expected '$ExpectedLibDirPath'"
          }

          $ExpectedLlvmLibs = @(
            "LLVMBitReader.lib",
            "LLVMCore.lib",
            "LLVMRemarks.lib",
            "LLVMBitstreamReader.lib",
            "LLVMBinaryFormat.lib",
            "LLVMTargetParser.lib",
            "LLVMSupport.lib",
            "LLVMDemangle.lib"
          )

          $LibTokens = @((& $LlvmConfig --link-static --libs core bitreader) -split '\s+' | ForEach-Object { Convert-ToLibName $_ })
          if ($LASTEXITCODE -ne 0) {
            throw "llvm-config --link-static --libs core bitreader failed"
          }

          $ReportedLlvmLibs = @($LibTokens | Where-Object { $_ -like "LLVM*.lib" })
          Compare-LibSet -Expected $ExpectedLlvmLibs -Actual $ReportedLlvmLibs -Label "LLVM libs"

          foreach ($ReportedLib in $ReportedLlvmLibs) {
            if (-not (Test-Path (Join-Path $PackageLibDir $ReportedLib))) {
              throw "llvm-config reported '$ReportedLib', but it is not in the package lib directory"
            }
          }

          $ExpectedSystemLibs = @(
            "advapi32.lib",
            "ntdll.lib",
            "ole32.lib",
            "psapi.lib",
            "shell32.lib",
            "uuid.lib",
            "ws2_32.lib"
          )

          $SystemLibTokens = @((& $LlvmConfig --link-static --system-libs core bitreader) -split '\s+' | ForEach-Object { Convert-ToLibName $_ })
          if ($LASTEXITCODE -ne 0) {
            throw "llvm-config --link-static --system-libs core bitreader failed"
          }

          $ReportedSystemLibs = @($SystemLibTokens | Where-Object { $_ -like "*.lib" })
          Compare-LibSet -Expected $ExpectedSystemLibs -Actual $ReportedSystemLibs -Label "System libs"

          $DumpbinOutput = & dumpbin /directives (Join-Path $PackageLibDir "LLVMCore.lib")
          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin /directives LLVMCore.lib failed"
          }

          $DumpbinText = $DumpbinOutput -join "`n"
          if ($DumpbinText -notmatch 'RuntimeLibrary=MT_StaticRelease') {
            throw "LLVMCore.lib does not contain RuntimeLibrary=MT_StaticRelease"
          }

          if ($DumpbinText -match 'RuntimeLibrary=MD_DynamicRelease') {
            throw "LLVMCore.lib contains RuntimeLibrary=MD_DynamicRelease"
          }

          @(
            "LLVM core libs link manifest"
            "LLVM version: $Version"
            "Target: x86_64-windows"
            "MSVC runtime: MultiThreaded (/MT)"
            ""
            "Command:"
            "  bin\llvm-config.exe --link-static --libs core bitreader"
            ""
            "LLVM libs:"
            $ExpectedLlvmLibs
            ""
            "Command:"
            "  bin\llvm-config.exe --link-static --system-libs core bitreader"
            ""
            "System libs:"
            ($ReportedSystemLibs | Sort-Object)
          ) | Set-Content -Path (Join-Path $PackageRoot "llvm-link-core-bitreader.txt") -Encoding ASCII

      - name: Package LLVM core libs
        shell: pwsh
        run: |
          $PackageName = "llvm-core-libs-${{matrix.version}}-x86_64-windows-mt"
          cmd.exe /c "7z a -ttar -snl -so $PackageName.tar $PackageName | 7z a -si $PackageName.tar.xz"

      - name: Upload LLVM core libs package
        uses: actions/upload-artifact@v7
        with:
          name: llvm-core-libs-${{matrix.version}}-x86_64-windows-mt
          path: llvm-core-libs-${{matrix.version}}-x86_64-windows-mt.tar.xz
